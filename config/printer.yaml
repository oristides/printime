# Printime — maintainer default (80mm POS-8370 / RP-F10 class)
# Others: copy config/printer.example.yaml → config/printer.yaml

printer:
  backend: usb
  cups_queue: POS8370
  device: /dev/usb/lp5
  width: 48
  paper_width_pixels: 576
  encoding: cp860            # Portuguese POS printers (ã, õ); cp850 for generic EU

  usb:
    vendor_id: 0x0416
    product_id: 0x5011
    in_ep: 0x81
    out_ep: 0x01

  profile: RP-F10-80mm
  qr_size: 8
  link_qr_size: 4
  link_qr_align: left

templates:
  default_layout: receipt
